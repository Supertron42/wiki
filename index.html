<head>

<!-- Structured Data -->
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Supertron's Wikis",
    "description": "Skyrim SE mod documentation and WoW Classic TBC class guides by Supertron",
    "author": {
        "@type": "Person",
        "name": "Supertron"
    }
}
</script>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body {
    font-family: Segoe UI, Arial, sans-serif;
    font-size: 13px;
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1e1e1e;
    color: #d4d4d4;
    padding: 50px 20px;
}

.hero-header {
    width: min(900px, 92vw);
    margin: 0 auto 6px;
    text-align: center;
}
.hero-title {
    font-family: "Orbitron", "Bank Gothic", "Eurostile", "Rajdhani", "Trebuchet MS", sans-serif;
    font-size: clamp(30px, 5.2vw, 54px);
    letter-spacing: 8px;
    color: #dff6ff;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(120, 220, 255, 0.55), 0 0 30px rgba(120, 220, 255, 0.25);
}
.hero-bar {
    height: 2px;
    width: min(420px, 70vw);
    margin: 12px auto 0;
    border-radius: 999px;
    background: linear-gradient(90deg, transparent, rgba(218, 142, 53, 0.75), rgba(86, 156, 214, 0.75), transparent);
    box-shadow: 0 0 10px rgba(86, 156, 214, 0.5);
    position: relative;
    overflow: hidden;
}
.hero-bar::after {
    content: "";
    position: absolute;
    top: -2px;
    left: -20%;
    width: 20%;
    height: 6px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
    filter: blur(1px);
    animation: sweep-light 2.2s linear infinite;
}
@keyframes sweep-light {
    0% { transform: translateX(0); opacity: 0; }
    10% { opacity: 0.8; }
    50% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateX(600%); opacity: 0; }
}

.choose-sub {
    color: #9cdcfe;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin: 26px 0 36px;
    text-align: center;
}

.choice-grid {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 920px;
}

.choice-card {
    position: relative;
    text-decoration: none;
    color: inherit;
    flex: 1 1 380px;
    max-width: 430px;
    min-height: 320px;
    border-radius: 14px;
    padding: 44px 34px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    border: 1px solid #3c3c3c;
    background: #252526;
    overflow: hidden;
    transition: transform 0.18s ease, box-shadow 0.25s ease, border-color 0.18s ease;
    user-select: none;
    -webkit-user-select: none;
}
.choice-card::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 0;
    opacity: 0.5;
    background: var(--bg);
    transition: opacity 0.25s ease;
}
.choice-card > * {
    position: relative;
    z-index: 1;
}
.choice-card:hover {
    transform: translateY(-6px);
    border-color: var(--accent);
    box-shadow: 0 0 10px 1px var(--glow-core), 0 0 28px 4px var(--glow-outer);
}
.choice-card:hover::before {
    opacity: 0.85;
}

.choice-emblem {
    line-height: 1;
    margin-bottom: 20px;
    color: var(--accent);
    filter: drop-shadow(0 0 12px var(--glow-core));
}
.choice-emblem svg {
    display: block;
    width: 88px;
    height: 88px;
}
.choice-title {
    font-family: "Orbitron", "Bank Gothic", "Eurostile", "Rajdhani", "Trebuchet MS", sans-serif;
    font-size: clamp(22px, 3.4vw, 30px);
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 12px;
}
.choice-desc {
    color: #cfd8e3;
    font-size: 13px;
    max-width: 300px;
    margin-bottom: 26px;
}
.choice-enter {
    display: inline-block;
    padding: 11px 30px;
    border-radius: 6px;
    font-weight: bold;
    font-size: 13px;
    letter-spacing: 1px;
    color: #fff;
    background: var(--accent);
    transition: filter 0.15s;
}
.choice-card:hover .choice-enter {
    filter: brightness(1.12);
}

.kofi-wrap {
    margin-top: 46px;
    text-align: center;
}
.kofi-container {
    position: relative;
    display: inline-block;
    overflow: visible;
}
@keyframes poop-fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(120px) rotate(360deg); opacity: 0; }
}
.poop-drop {
    position: absolute;
    font-size: 20px;
    pointer-events: none;
    animation: poop-fall 1s ease-in forwards;
    z-index: 100;
}
</style>
</head>
<body>

<div class="hero-header">
    <div class="hero-title">SUPERTRON</div>
    <div class="hero-bar"></div>
</div>

<p class="choose-sub">Choose your game</p>

<div class="choice-grid">
    <a href="skyrim.html" class="choice-card" style="
        --accent: #4f9dd1;
        --glow-core: rgba(79, 157, 209, 0.6);
        --glow-outer: rgba(79, 157, 209, 0.32);
        --bg: radial-gradient(circle at 50% 28%, rgba(40, 92, 124, 0.55), rgba(20, 28, 38, 0.15) 70%);">
        <div class="choice-emblem">
            <svg viewBox="0 0 120 120" role="img" aria-label="Skyrim emblem">
                <g fill="currentColor" opacity="0.85">
                    <path d="M46 50 L18 45 L33 53 L14 56 L33 62 L20 70 L46 66 Z"/>
                    <path d="M74 50 L102 45 L87 53 L106 56 L87 62 L100 70 L74 66 Z"/>
                </g>
                <path d="M40 40 H80 V64 Q80 84 60 94 Q40 84 40 64 Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
                <g fill="currentColor">
                    <path d="M60 30 L63 40 L62 78 L58 78 L57 40 Z"/>
                    <rect x="48" y="74" width="24" height="5" rx="1.5"/>
                    <rect x="57.5" y="79" width="5" height="9"/>
                    <circle cx="60" cy="90" r="3.2"/>
                </g>
            </svg>
        </div>
        <div class="choice-title">Skyrim</div>
        <p class="choice-desc">SKSE plugins, modding tools and full mod documentation.</p>
        <span class="choice-enter">Enter &#8594;</span>
    </a>

    <a href="wow_class_guides/index.html" class="choice-card" style="
        --accent: #e0a32e;
        --glow-core: rgba(224, 163, 46, 0.6);
        --glow-outer: rgba(224, 163, 46, 0.32);
        --bg: radial-gradient(circle at 50% 28%, rgba(122, 84, 22, 0.55), rgba(34, 28, 16, 0.15) 70%);">
        <div class="choice-emblem">
            <svg viewBox="0 0 120 120" role="img" aria-label="World of Warcraft emblem">
                <circle cx="60" cy="60" r="40" fill="none" stroke="currentColor" stroke-width="4"/>
                <circle cx="60" cy="18" r="3.5" fill="currentColor"/>
                <circle cx="60" cy="102" r="3.5" fill="currentColor"/>
                <g transform="rotate(45 60 60)" fill="currentColor">
                    <path d="M60 26 L63 36 L62 78 L58 78 L57 36 Z"/>
                    <rect x="49" y="74" width="22" height="5" rx="1.5"/>
                    <rect x="57.5" y="79" width="5" height="11"/>
                    <circle cx="60" cy="92" r="3"/>
                </g>
                <g transform="rotate(-45 60 60)" fill="currentColor">
                    <rect x="58" y="28" width="4" height="64" rx="1"/>
                    <path d="M62 33 Q84 33 80 55 Q68 53 62 50 Z"/>
                    <path d="M58 33 Q36 33 40 55 Q52 53 58 50 Z"/>
                </g>
            </svg>
        </div>
        <div class="choice-title">World of Warcraft</div>
        <p class="choice-desc">TBC Classic Anniversary class guides, BiS gear and rotations.</p>
        <span class="choice-enter">Enter &#8594;</span>
    </a>
</div>

<div class="kofi-wrap">
    <div class="kofi-container" id="kofiContainer">
        <a href="https://ko-fi.com/supertron" target="_blank" class="kofi-btn"><img src="collectionsmanager/support on kofi.png" alt="Support me on Ko-fi" style="height: 36px;"></a>
    </div>
</div>

<script>
// Poop rain on kofi hover
(function() {
    const container = document.getElementById('kofiContainer');
    let poopInterval = null;

    function spawnPoop() {
        const poop = document.createElement('span');
        poop.className = 'poop-drop';
        poop.textContent = '\u{1F4A9}';
        poop.style.left = (Math.random() * 100) + '%';
        poop.style.top = '0';
        container.appendChild(poop);
        setTimeout(() => poop.remove(), 1000);
    }

    container.addEventListener('mouseenter', () => {
        poopInterval = setInterval(spawnPoop, 80);
    });

    container.addEventListener('mouseleave', () => {
        clearInterval(poopInterval);
    });
})();
</script>
</body>
</html>
